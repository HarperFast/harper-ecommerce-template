rest:
  webSocket: false
graphqlSchema:
  files: '*.graphql'
jsResource:
  files: './resources.js'
# Must load BEFORE @harperfast/nextjs: earlier-registered http listeners are
# outer middleware layers, so its AsyncLocalStorage context wraps the Next.js
# render and `decision;dur` can be recorded from server components (issue #7).
server-timing:
  package: './server-timing'
  files: '/*'
'@harperfast/nextjs':
  package: '@harperfast/nextjs'
  setCwd: false
  prebuilt: true
  # NOTE: do NOT add `files: '/*'` under this plugin in @harperfast/nextjs 2.x
